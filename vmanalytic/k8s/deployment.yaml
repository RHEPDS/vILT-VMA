apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmanalytic
  namespace: vmanalytic
  labels:
    app.kubernetes.io/name: vmanalytic
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: vmanalytic
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmanalytic
    spec:
      containers:
        - name: app
          # Build: docker build -t <registry>/vmanalytic:<tag> .
          image: vmanalytic:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vmanalytic-secrets
                  key: flask-secret-key
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: saved-csv
              mountPath: /app/saved_csv_files
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              memory: 512Mi
              cpu: "250m"
            limits:
              memory: 4Gi
              cpu: "2"
      volumes:
        - name: data
          emptyDir: {}
        - name: saved-csv
          emptyDir: {}
