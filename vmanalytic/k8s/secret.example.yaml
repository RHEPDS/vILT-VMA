# Copy to secret.yaml (do not commit real values) or create imperatively:
#   kubectl -n vmanalytic create secret generic vmanalytic-secrets \
#     --from-literal=flask-secret-key="$(openssl rand -hex 32)"
apiVersion: v1
kind: Secret
metadata:
  name: vmanalytic-secrets
  namespace: vmanalytic
type: Opaque
stringData:
  flask-secret-key: "REPLACE_WITH_LONG_RANDOM_STRING"
