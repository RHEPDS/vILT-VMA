# Apply:
#   1) kubectl apply -f namespace.yaml
#   2) kubectl -n vmanalytic create secret generic vmanalytic-secrets \
#        --from-literal=flask-secret-key="$(openssl rand -hex 32)"
#   3) kubectl apply -k .
#
# Or: kubectl apply -f namespace.yaml -f deployment.yaml -f service.yaml
#     (create secret as above first)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vmanalytic
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  # Optional: uncomment after editing host / ingressClassName
  # - ingress.yaml
  # Optional: use with PVC + patch deployment volumes (see pvc.yaml)
  # - pvc.yaml
