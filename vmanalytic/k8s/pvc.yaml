# Optional: persistent upload sessions under /app/data
# 1. Adjust storageClassName (e.g. standard, gp3, fast-ssd)
# 2. Replace emptyDir in deployment.yaml with:
#      volumes:
#        - name: data
#          persistentVolumeClaim:
#            claimName: vmanalytic-data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vmanalytic-data
  namespace: vmanalytic
  labels:
    app.kubernetes.io/name: vmanalytic
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard
